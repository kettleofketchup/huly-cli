name: CI

on:
  pull_request:
  push:
    tags: ['v*']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/huly/go.mod

      # The Go module lives under src/huly, so run golangci-lint there.
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: src/huly

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/huly/go.mod

      - name: Test
        run: just cicd::test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/huly/go.mod

      - name: Build
        run: just cicd::build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: huly
          path: bin/

  release:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/huly/go.mod

      # Cross-compile dist/huly_<os>_<arch> for every platform.
      - name: Build release binaries
        run: just release::all

      # Attach the binaries to the GitHub Release so `huly update` can find
      # assets named huly_<os>_<arch> (see getBinaryName in cmd/update.go).
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/huly_*
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG="ghcr.io/kettleofketchup/huly-cli/huly:${GITHUB_REF_NAME}"
          just cicd::docker $TAG
          docker push $TAG
          if echo "${GITHUB_REF_NAME}" | grep -qE '^v[0-9]+\.[0-9]+'; then
            LATEST="ghcr.io/kettleofketchup/huly-cli/huly:latest"
            docker tag $TAG $LATEST
            docker push $LATEST
          fi
